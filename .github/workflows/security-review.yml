name: Weekly Security Review

# Runs security code-review checks once a week. CodeQL performs static
# security analysis of the JS/TS code; npm audit flags vulnerable dependencies.
# Findings appear under the repo's Security tab and in the run logs.
on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  # Allow manual runs from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: security-review-${{ github.ref }}
  cancel-in-progress: false

jobs:
  codeql:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          language: ${{ matrix.language }}
          # security-extended adds deeper security queries on top of the defaults
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'

  dependency-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run npm audit (fails on high or critical)
        run: npm audit --audit-level=high
