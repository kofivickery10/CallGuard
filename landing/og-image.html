<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @page { size: 1200px 630px; margin: 0; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
    background:
      radial-gradient(circle at 80% 20%, rgba(74, 158, 110, 0.35), transparent 50%),
      radial-gradient(circle at 20% 80%, rgba(45, 110, 74, 0.25), transparent 50%),
      linear-gradient(135deg, #1a2e1a 0%, #2d4a30 60%, #0f1f10 100%);
    color: white;
    padding: 60px 80px 0;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .brand { margin-bottom: 56px; }
  .headline { margin-bottom: 36px; }
  .brand {
    display: inline-flex;
    align-items: center;
    gap: 16px;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .brand .mark {
    width: 56px;
    height: 56px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .brand .ai {
    color: #4a9e6e;
    margin-left: 4px;
  }
  .headline {
    font-size: 68px;
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -2px;
    max-width: 1000px;
  }
  .headline .accent { color: #6ec59a; }
  .footer-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    font-size: 22px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.78);
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 22px;
    background: rgba(74, 158, 110, 0.18);
    border: 1px solid rgba(110, 197, 154, 0.35);
    border-radius: 999px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.4px;
    color: #c8e8d4;
  }
  .pill .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #6ec59a;
    box-shadow: 0 0 12px #6ec59a;
  }
</style>
</head>
<body>
  <div class="brand">
    <span class="mark">
      <svg width="56" height="56" viewBox="96 54 320 408" fill="none">
        <path d="M134 64 H378 A28 28 0 0 1 406 92 V236 C406 348 342 416 256 452 C170 416 106 348 106 236 V92 A28 28 0 0 1 134 64 Z" fill="#4a9e6e"/>
        <path d="M128 236 L206 236 L232 236 L252 150 L274 312 L298 236 L384 236" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>
    CallGuard <span class="ai">AI</span>
  </div>

  <div class="headline">
    AI call QA and<br/>
    <span class="accent">compliance scoring</span><br/>
    for contact centres.
  </div>

  <span class="pill"><span class="dot"></span>Live and after the call · callguardai.co.uk</span>
</body>
</html>
